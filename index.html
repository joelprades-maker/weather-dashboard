<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard — España</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #f8fafc; }
    header p  { margin-top: .4rem; font-size: .9rem; color: #94a3b8; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .controls select, .controls button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: .5rem;
      padding: .5rem 1rem;
      font-size: .875rem;
      cursor: pointer;
    }
    .controls button.active, .controls button:hover { background: #3b82f6; border-color: #3b82f6; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto 2.5rem;
    }
    .kpi {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: .75rem;
      padding: 1.25rem;
      text-align: center;
    }
    .kpi .city  { font-size: .75rem; color: #94a3b8; margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .05em; }
    .kpi .value { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    .kpi .label { font-size: .75rem; color: #64748b; margin-top: .2rem; }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .chart-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: .75rem;
      padding: 1.25rem;
    }
    .chart-card h2 { font-size: .9rem; font-weight: 600; color: #cbd5e1; margin-bottom: 1rem; }
    .chart-card canvas { max-height: 240px; }

    .no-data {
      text-align: center;
      padding: 4rem 1rem;
      color: #64748b;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: .75rem;
      color: #475569;
    }
  </style>
</head>
<body>

<header>
  <h1>Weather Dashboard — España</h1>
  <p id="subtitle">Cargando datos…</p>
</header>

<div class="controls">
  <select id="citySelect"></select>
  <select id="daysSelect">
    <option value="7">Últimos 7 días</option>
    <option value="14">Últimos 14 días</option>
    <option value="30" selected>Últimos 30 días</option>
    <option value="0">Todo el histórico</option>
  </select>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="charts-grid" id="chartsGrid"></div>

<div class="no-data" id="noData" style="display:none">
  No hay datos disponibles aún. El pipeline ejecutará su primera carga mañana a las 08:00 UTC.
</div>

<footer>
  Datos: <a href="https://open-meteo.com" style="color:#3b82f6">Open-Meteo</a> ·
  Actualización diaria 08:00 UTC · Fuente: <code>data/weather.json</code>
</footer>

<script>
const CITIES = ["Madrid","Barcelona","Valencia","Sevilla","Bilbao","Zaragoza"];
const PALETTE = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4"];

const WMO = {
  0:"Despejado", 1:"Mayormente despejado", 2:"Parcialmente nublado", 3:"Nublado",
  45:"Niebla", 48:"Niebla con escarcha",
  51:"Llovizna ligera", 53:"Llovizna moderada", 55:"Llovizna densa",
  61:"Lluvia ligera", 63:"Lluvia moderada", 65:"Lluvia fuerte",
  71:"Nevada ligera", 73:"Nevada moderada", 75:"Nevada fuerte",
  80:"Chubascos ligeros", 81:"Chubascos moderados", 82:"Chubascos fuertes",
  95:"Tormenta", 96:"Tormenta con granizo", 99:"Tormenta con granizo fuerte",
};

let allData = [];
let charts = {};

async function loadData() {
  const resp = await fetch("data/weather.json?t=" + Date.now());
  allData = await resp.json();
}

function getSlice(days) {
  if (!days || allData.length === 0) return allData;
  return allData.slice(-days);
}

function buildKPIs(data, city) {
  const grid = document.getElementById("kpiGrid");
  grid.innerHTML = "";
  if (!data.length) return;

  const latest = data[data.length - 1];

  CITIES.forEach((c, i) => {
    const cd = latest.cities[c];
    if (!cd) return;
    const kpi = document.createElement("div");
    kpi.className = "kpi";
    kpi.innerHTML = `
      <div class="city">${c}</div>
      <div class="value" style="color:${PALETTE[i]}">${cd.temp_max}° / ${cd.temp_min}°</div>
      <div class="label">${WMO[cd.weathercode] ?? "—"}</div>
      <div class="label" style="margin-top:.4rem">☔ ${cd.precipitation} mm &nbsp; 💨 ${cd.windspeed_max} km/h</div>
      <div class="label">☀️ ${cd.sunshine_hours} h sol</div>
    `;
    grid.appendChild(kpi);
  });
}

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function buildCharts(data, city) {
  destroyCharts();
  const grid = document.getElementById("chartsGrid");
  grid.innerHTML = "";

  const labels = data.map(e => e.date);
  const citiesToPlot = city === "todas" ? CITIES : [city];

  function card(id, title) {
    const div = document.createElement("div");
    div.className = "chart-card";
    div.innerHTML = `<h2>${title}</h2><canvas id="${id}"></canvas>`;
    grid.appendChild(div);
    return document.getElementById(id);
  }

  // Temperatura máxima
  const c1 = card("chartTempMax", "Temperatura máxima (°C)");
  charts.tempMax = new Chart(c1, {
    type: "line",
    data: {
      labels,
      datasets: citiesToPlot.map((c, i) => ({
        label: c,
        data: data.map(e => e.cities[c]?.temp_max ?? null),
        borderColor: PALETTE[CITIES.indexOf(c)],
        backgroundColor: "transparent",
        tension: 0.3,
        pointRadius: 3,
      })),
    },
    options: chartOpts("°C"),
  });

  // Temperatura mínima
  const c2 = card("chartTempMin", "Temperatura mínima (°C)");
  charts.tempMin = new Chart(c2, {
    type: "line",
    data: {
      labels,
      datasets: citiesToPlot.map((c, i) => ({
        label: c,
        data: data.map(e => e.cities[c]?.temp_min ?? null),
        borderColor: PALETTE[CITIES.indexOf(c)],
        backgroundColor: "transparent",
        tension: 0.3,
        pointRadius: 3,
      })),
    },
    options: chartOpts("°C"),
  });

  // Precipitación
  const c3 = card("chartPrecip", "Precipitación acumulada (mm)");
  charts.precip = new Chart(c3, {
    type: "bar",
    data: {
      labels,
      datasets: citiesToPlot.map((c) => ({
        label: c,
        data: data.map(e => e.cities[c]?.precipitation ?? null),
        backgroundColor: PALETTE[CITIES.indexOf(c)] + "bb",
      })),
    },
    options: chartOpts("mm"),
  });

  // Viento máximo
  const c4 = card("chartWind", "Viento máximo (km/h)");
  charts.wind = new Chart(c4, {
    type: "line",
    data: {
      labels,
      datasets: citiesToPlot.map((c) => ({
        label: c,
        data: data.map(e => e.cities[c]?.windspeed_max ?? null),
        borderColor: PALETTE[CITIES.indexOf(c)],
        backgroundColor: "transparent",
        tension: 0.3,
        pointRadius: 3,
      })),
    },
    options: chartOpts("km/h"),
  });

  // Horas de sol
  const c5 = card("chartSun", "Horas de sol");
  charts.sun = new Chart(c5, {
    type: "bar",
    data: {
      labels,
      datasets: citiesToPlot.map((c) => ({
        label: c,
        data: data.map(e => e.cities[c]?.sunshine_hours ?? null),
        backgroundColor: PALETTE[CITIES.indexOf(c)] + "bb",
      })),
    },
    options: chartOpts("h"),
  });
}

function chartOpts(unit) {
  return {
    responsive: true,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { labels: { color: "#94a3b8", boxWidth: 12 } },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} ${unit}`,
        },
      },
    },
    scales: {
      x: { ticks: { color: "#64748b", maxTicksLimit: 10 }, grid: { color: "#1e293b" } },
      y: { ticks: { color: "#64748b" }, grid: { color: "#334155" } },
    },
  };
}

function render() {
  const city = document.getElementById("citySelect").value;
  const days = parseInt(document.getElementById("daysSelect").value);
  const slice = getSlice(days);

  document.getElementById("noData").style.display = slice.length ? "none" : "block";
  document.getElementById("chartsGrid").style.display = slice.length ? "" : "none";
  document.getElementById("kpiGrid").style.display = slice.length ? "" : "none";

  if (!slice.length) return;

  const latest = slice[slice.length - 1];
  document.getElementById("subtitle").textContent =
    `Última actualización: ${latest.fetched_at} · ${slice.length} día${slice.length > 1 ? "s" : ""} de datos`;

  buildKPIs(slice, city);
  buildCharts(slice, city);
}

async function init() {
  // Populate city selector
  const sel = document.getElementById("citySelect");
  [["todas", "Todas las ciudades"], ...CITIES.map(c => [c, c])].forEach(([v, l]) => {
    const o = document.createElement("option");
    o.value = v; o.textContent = l;
    sel.appendChild(o);
  });

  try {
    await loadData();
  } catch (e) {
    document.getElementById("subtitle").textContent = "Error cargando datos.";
    document.getElementById("noData").style.display = "block";
    return;
  }

  render();

  document.getElementById("citySelect").addEventListener("change", render);
  document.getElementById("daysSelect").addEventListener("change", render);
}

init();
</script>
</body>
</html>
